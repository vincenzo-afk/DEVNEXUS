name: Deploy

on:
  push:
    branches: [main]

env:
  # Shared environment variables available to all jobs
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────
  # 1. Deploy Frontend → Vercel
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment deployment URL on commit
        if: github.event_name == 'push'
        run: |
          echo "✅ Frontend deployed to: ${{ steps.deploy.outputs.deploy_url }}"

  # ─────────────────────────────────────────────
  # 2. Deploy Backend → Railway
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy to Railway
        run: railway up --service devnexus-api --detach
        working-directory: apps/api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # These are injected as Railway environment variables via the dashboard,
          # but we explicitly confirm they exist in CI:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_APP_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_APP_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Confirm Railway deployment
        run: |
          echo "✅ Backend deployment triggered on Railway."
          echo "Monitor at: https://railway.app/project/${{ secrets.RAILWAY_PROJECT_ID }}"

  # ─────────────────────────────────────────────
  # 3. Post-Deploy Smoke Test
  # ─────────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    environment: production

    steps:
      - name: Wait for Railway to warm up
        run: sleep 20

      - name: Health check — API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.NEXT_PUBLIC_API_URL }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ API health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ API health check passed (HTTP $STATUS)"

      - name: Health check — Frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.NEXTAUTH_URL }})
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Frontend health check passed (HTTP $STATUS)"
